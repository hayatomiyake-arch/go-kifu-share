name: Keep Supabase Alive

on:
  schedule:
    # 毎週月曜 9:00 UTC（日本時間 月曜 18:00）に実行
    - cron: '0 9 * * 1'
  workflow_dispatch: # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase via API
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" "https://go-kifu-share.vercel.app/api/game?id=healthcheck")
          echo "Response status: $response"
          # 404はDBが応答している証拠（存在しないIDなので正常）
          if [ "$response" = "404" ] || [ "$response" = "200" ]; then
            echo "Supabase is alive!"
          else
            echo "Warning: Unexpected status code $response"
            exit 1
          fi
